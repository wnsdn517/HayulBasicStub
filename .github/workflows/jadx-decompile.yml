name: JADX Decompile APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APKMirror APK 상세 페이지 URL'
        required: true

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Install Python dependencies
        run: |
          pip install playwright requests -q
          playwright install chromium --with-deps -q

      - name: Download APKM from APKMirror
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          from urllib.parse import urljoin
          import requests

          base_url = "https://www.apkmirror.com"
          apk_url = "${{ inputs.apk_url }}"
          ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(user_agent=ua, viewport={"width": 1280, "height": 800})
              page = context.new_page()

              page.goto(apk_url, wait_until="networkidle", timeout=60000)
              btn = page.query_selector("a.downloadButton")
              if not btn:
                  raise ValueError("downloadButton not found:\n" + page.content()[:3000])

              download_page_url = urljoin(base_url, btn.get_attribute("href"))

              page.goto(download_page_url, wait_until="networkidle", timeout=60000)
              dl_link = page.query_selector('a[rel="nofollow"][data-google-interstitial="false"][href*="download.php"]')
              if not dl_link:
                  raise ValueError("download.php link not found:\n" + page.content()[:3000])

              dl_url = urljoin(base_url, dl_link.get_attribute("href"))
              cookies = {c["name"]: c["value"] for c in context.cookies()}
              browser.close()

          session = requests.Session()
          session.cookies.update(cookies)
          r = session.get(dl_url, headers={"User-Agent": ua, "Referer": base_url}, stream=True)
          r.raise_for_status()
          with open("target.apkm", "wb") as f:
              for chunk in r.iter_content(1024 * 1024):
                  if chunk:
                      f.write(chunk)
          print("Downloaded")
          EOF

      - name: Merge APKM with APKEditor
        run: |
          APKEDITOR_URL=$(curl -s https://api.github.com/repos/REAndroid/APKEditor/releases/latest \
            | jq -r '.assets[] | select(.name | test("APKEditor.*\\.jar$")) | .browser_download_url' \
            | head -1)
          wget -q "$APKEDITOR_URL" -O APKEditor.jar
          unzip -q target.apkm -d apkm_extracted
          java -jar APKEditor.jar m -i apkm_extracted -o merged.apk

      - name: Download JADX
        run: |
          JADX_URL=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest \
            | jq -r '.assets[] | select(.name | test("^jadx-[0-9].*\\.zip$")) | .browser_download_url' \
            | head -1)
          wget -q "$JADX_URL" -O jadx.zip
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Decompile with JADX
        run: ./jadx/bin/jadx --threads-count 4 -d decompiled merged.apk || true

      - name: Zip decompiled output
        run: zip -r decompiled.zip decompiled/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-apk
          path: decompiled.zip
          retention-days: 7
