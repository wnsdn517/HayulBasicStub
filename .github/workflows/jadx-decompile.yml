name: JADX Decompile APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APK / APKM 다운로드 URL'
        required: true

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Download JADX
        run: |
          JADX_URL=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest \
            | grep browser_download_url \
            | grep '"jadx-[0-9][^"]*\.zip"' \
            | head -1 \
            | cut -d'"' -f4)
          wget -q "$JADX_URL" -O jadx.zip
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Download file
        run: |
          wget -q --user-agent="Mozilla/5.0 (Linux; Android 14; Pixel 8) AppleWebKit/537.36 Chrome/124.0 Mobile Safari/537.36" \
            --referer="https://www.apkmirror.com/" \
            "${{ inputs.apk_url }}" -O downloaded

      - name: Prepare APK
        run: |
          FILE_TYPE=$(file -b downloaded)
          echo "File type: $FILE_TYPE"

          if echo "$FILE_TYPE" | grep -qi zip; then
            echo "APKM detected, extracting base.apk..."
            unzip -q downloaded 'base.apk' -d apkm_extracted
            cp apkm_extracted/base.apk target.apk
          else
            cp downloaded target.apk
          fi

      - name: Decompile with JADX
        run: |
          ./jadx/bin/jadx --threads-count 4 -d decompiled target.apk

      - name: Zip decompiled output
        run: zip -r decompiled.zip decompiled/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-apk
          path: decompiled.zip
          retention-days: 7
