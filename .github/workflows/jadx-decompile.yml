name: JADX Decompile APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APKMirror APK 상세 페이지 URL'
        required: true

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Install Python dependencies
        run: pip install cloudscraper beautifulsoup4 tqdm -q

      - name: Download APK/APKM from APKMirror
        run: |
          python3 - <<'EOF'
          import time, cloudscraper, os
          from urllib.parse import unquote
          from bs4 import BeautifulSoup

          base_url = "https://www.apkmirror.com"
          headers = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:122.0) Gecko/20100101 Firefox/122.0"}
          scraper = cloudscraper.create_scraper()
          url = "${{ inputs.apk_url }}"

          def get_soup(u):
              return BeautifulSoup(scraper.get(u, headers=headers, timeout=30).text, "html.parser")

          # 1. downloadButton → download 확인 페이지
          soup = get_soup(url)
          btn = soup.find("a", {"class": "downloadButton"})
          if not btn: raise ValueError("downloadButton not found")
          confirm_url = base_url + btn["href"]

          # 2. download.php 링크 추출
          soup2 = get_soup(confirm_url)
          data = soup2.find("a", {"rel": "nofollow", "data-google-interstitial": "false",
              "href": lambda h: h and "/wp-content/themes/APKMirror/download.php" in h})
          if not data: raise ValueError("download.php link not found")
          dl_url = base_url + data["href"]

          # 3. 실제 다운로드
          r = scraper.head(dl_url, headers=headers, allow_redirects=True)
          filename = unquote(r.url.split("/")[-1].split("?")[0]) or "downloaded"
          r = scraper.get(r.url, headers=headers, stream=True)
          with open("downloaded", "wb") as f:
              for chunk in r.iter_content(1024 * 1024):
                  if chunk: f.write(chunk)
          print(f"Downloaded: {filename}")
          EOF

      - name: Prepare APK
        run: |
          FILE_TYPE=$(file -b downloaded)
          echo "File type: $FILE_TYPE"
          if echo "$FILE_TYPE" | grep -qi zip; then
            echo "APKM detected, extracting base.apk..."
            unzip -q downloaded base.apk -d apkm_extracted
            cp apkm_extracted/base.apk target.apk
          else
            cp downloaded target.apk
          fi

      - name: Download JADX
        run: |
          JADX_URL=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest \
            | grep browser_download_url \
            | grep '"jadx-[0-9][^"]*\.zip"' \
            | head -1 \
            | cut -d'"' -f4)
          wget -q "$JADX_URL" -O jadx.zip
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Decompile with JADX
        run: ./jadx/bin/jadx --threads-count 4 -d decompiled target.apk

      - name: Zip decompiled output
        run: zip -r decompiled.zip decompiled/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-apk
          path: decompiled.zip
          retention-days: 7
